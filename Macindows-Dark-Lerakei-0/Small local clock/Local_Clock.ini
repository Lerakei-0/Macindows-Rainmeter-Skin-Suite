X=115
Y=16
FontFace=Georgia
FontSize=9
FontWeight=700
FontColor=255,255,255,255
StringAlign=Center
AntiAlias=1
Text=CLOCK

; ═══════════════════════════════════════════════════════════════
;  CLOCK FACE
; ═══════════════════════════════════════════════════════════════

; Clock face background circle
[ClockFace]
Meter=Shape
Shape=Ellipse 115,131,83,83 | Fill Color 0,0,0,255 | Stroke Color 255,255,255,255 | StrokeWidth 2

; Hour markers
[HourMark12]
Meter=Shape
Shape=Line 115,48,115,56 | Stroke Color 255,255,255,255 | StrokeWidth 2

[HourMark1]
Meter=Shape
Shape=Line 156,59,154,63 | Stroke Color 255,255,255,255 | StrokeWidth 1

[HourMark2]
Meter=Shape
Shape=Line 187,90,183,92 | Stroke Color 255,255,255,255 | StrokeWidth 1

[HourMark3]
Meter=Shape
Shape=Line 198,131,190,131 | Stroke Color 255,255,255,255 | StrokeWidth 2

[HourMark4]
Meter=Shape
Shape=Line 187,172,183,170 | Stroke Color 255,255,255,255 | StrokeWidth 1

[HourMark5]
Meter=Shape
Shape=Line 156,203,154,199 | Stroke Color 255,255,255,255 | StrokeWidth 1

[HourMark6]
Meter=Shape
Shape=Line 115,214,115,206 | Stroke Color 255,255,255,255 | StrokeWidth 2

[HourMark7]
Meter=Shape
Shape=Line 74,203,76,199 | Stroke Color 255,255,255,255 | StrokeWidth 1

[HourMark8]
Meter=Shape
Shape=Line 43,172,47,170 | Stroke Color 255,255,255,255 | StrokeWidth 1

[HourMark9]
Meter=Shape
Shape=Line 32,131,40,131 | Stroke Color 255,255,255,255 | StrokeWidth 2

[HourMark10]
Meter=Shape
Shape=Line 43,90,47,92 | Stroke Color 255,255,255,255 | StrokeWidth 1

[HourMark11]
Meter=Shape
Shape=Line 73,59,75,63 | Stroke Color 255,255,255,255 | StrokeWidth 1

[HourHand]
Meter=Shape
Shape=Line 115,131,(115+(38*Sin((([MeasureHours]%12)*30+[MeasureMinutes]*0.5)*Pi/180))),(131-(38*Cos((([MeasureHours]%12)*30+[MeasureMinutes]*0.5)*Pi/180))) | Stroke Color 255,255,255,255 | StrokeWidth 4
DynamicVariables=1

; Minute hand
[MinuteHand]
Meter=Shape
Shape=Line 115,131,(115+(58*Sin([MeasureMinutes]*6*Pi/180))),(131-(58*Cos([MeasureMinutes]*6*Pi/180))) | Stroke Color 255,255,255,255 | StrokeWidth 3
DynamicVariables=1

; Second hand
[SecondHand]
Meter=Shape
Shape=Line 115,131,(115+(65*Sin([MeasureSeconds]*6*Pi/180))),(131-(65*Cos([MeasureSeconds]*6*Pi/180))) | Stroke Color 210,0,0,200 | StrokeWidth 1
DynamicVariables=1

; Center dot
[CenterDot]
Meter=Shape
Shape=Ellipse 115,131,5,5 | Fill Color 255,255,255,255 | Stroke Color 255,255,255,255 | StrokeWidth 1
