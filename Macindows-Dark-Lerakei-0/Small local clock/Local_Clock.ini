; ═══════════════════════════════════════════════════════════════
;  Analog Clock Widget (SMALL SQUARE) — Rainmeter Skin
;  Warm parchment palette · Bold black borders · Georgia serif
;  Shows current local time with analog clock face (210x210)
; ═══════════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0

[Metadata]
Name=Analog Clock Widget Small Square
Author=Lerakei-0
Version=1.0.0

; ═══════════════════════════════════════════════════════════════
;  MEASURES - Get current time
; ═══════════════════════════════════════════════════════════════

[MeasureHours]
Measure=Time
Format=%H

[MeasureMinutes]
Measure=Time
Format=%M

[MeasureSeconds]
Measure=Time
Format=%S

; ═══════════════════════════════════════════════════════════════
;  BACKGROUND & FRAME
; ═══════════════════════════════════════════════════════════════

[BgShadow]
Meter=Shape
Shape=Rectangle 9,9,218,221 | Fill Color 26,20,16,200 | StrokeWidth 0

[BgMain]
Meter=Shape
Shape=Rectangle 6,6,218,218 | Fill Color 25,25,25,255 | Stroke Color 255,255,255,255 | StrokeWidth 2

[HeaderBar]
Meter=Shape
Shape=Rectangle 6,6,218,32 | Fill Color 17,17,17,255 | Stroke Color 255,255,255,255 | StrokeWidth 2

