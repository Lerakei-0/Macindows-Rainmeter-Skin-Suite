; ═══════════════════════════════════════════════════════════════
;  System Monitor — Rainmeter Skin
;  Warm parchment palette · Bold black borders · Georgia serif
;  Displays: CPU Usage, RAM Usage, Disk Usage
; ═══════════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1


[Metadata]
Name=System Monitor
Author=Lerakei-0
Version=1.0.0

[Variables]
BgColor=255,249,236
BorderColor=26,20,16
AccentColor=106,184,176
BadgeColor=218,238,231
BadgeBorder=161,212,207

; ═══════════════════════════════════════════════════════════════
;  MEASURES
; ═══════════════════════════════════════════════════════════════

[MeasureCPU]
Measure=CPU
Processor=0

[MeasureRAM]
Measure=PhysicalMemory

[MeasureDisk]
Measure=FreeDiskSpace
Drive=C:
IgnoreRemovable=1
Percent=1

