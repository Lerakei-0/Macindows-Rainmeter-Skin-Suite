; ═══════════════════════════════════════════════════════════════
;  Mastodon Followers Widget (SMALL SQUARE) — Rainmeter Skin
;  Warm parchment palette · Bold black borders · Georgia serif
;  Auto-updating from Mastodon API (210x159)
; ═══════════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0

[Metadata]
Name=Mastodon Followers Widget Small Square
Author=Lerakei-0
Version=1.0.0

[Variables]
MastodonInstance={YOUR INSTANCE eg: mastodon.social}
MastodonUsername={YOUR USERNAME ON SAID INSTANCE}

; ═══════════════════════════════════════════════════════════════
;  MEASURES - Fetch from Mastodon API
; ═══════════════════════════════════════════════════════════════


[MeasureFollowers]
Measure=WebParser
URL=https://#MastodonInstance#/api/v1/accounts/lookup?acct=#MastodonUsername#
RegExp=followers_count[^0-9]*(\d+)
StringIndex=1
UpdateRate=600


