; ═══════════════════════════════════════════════════════════════
;  Slideshow Picture Frame (SMALL SQUARE) — Rainmeter Skin
;  Warm parchment palette · Bold black borders · Georgia serif
;  Auto-cycling through images in a folder (210x210)
; ═══════════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0

[Metadata]
Name=Slideshow Picture Frame Small Square
Author=Lerakei-0
Version=1.1.0

[Variables]
; EDIT THIS: Set your image folder path here
; Use backslashes and quotes around the path
FolderPath="{FULL PATH TO YOUR DESIRED IMAGE FOLDER eg:C:\Users\USERNAME\Pictures\wallpaper}"

; Include subfolders? (0 = no, 1 = yes)
IncludeSubFolders=0

; Delay between images in seconds
ImageDelay=5

; ═══════════════════════════════════════════════════════════════
;  MEASURES - QuotePlugin to get images
; ═══════════════════════════════════════════════════════════════

[MeasureImage]
Measure=Plugin
Plugin=Plugins\QuotePlugin.dll
PathName=#FolderPath#
Subfolders=#IncludeSubFolders#
FileFilter=*.jpg;*.jpeg;*.png;*.bmp;*.gif
UpdateDivider=#ImageDelay#

