; ═══════════════════════════════════════════════════════════════
;  World Clock — Rainmeter Skin
;  Warm parchment palette · Bold black borders · Georgia serif
; ═══════════════════════════════════════════════════════════════
;
;  ── HOW TO CONFIGURE ──────────────────────────────────────────
;  Edit the [Variables] section below.
;
;  ClockN_Label   = City name shown on the badge
;  ClockN_TZ      = UTC offset in hours (decimals OK, e.g. 5.5)
;                   Use "Local" for clock 1 only
;
;  ── TIMEZONE OFFSET QUICK REFERENCE ──────────────────────────
;  UTC          0       Moscow       3
;  London       0*      Dubai        4
;  Paris/Berlin 1*      India        5.5
;  Cairo        2       Bangkok      7
;  New York    -5*      China/SGP    8
;  Chicago     -6*      Tokyo        9
;  Denver      -7*      Sydney      10*
;  Los Angeles -8*      Auckland    12*
;  (* = add 1 during daylight saving time)
;
;  ── ADDING / REMOVING CLOCKS ──────────────────────────────────
;  Set ClockN_Visible=0 to hide any card.
;  Adjust BgMain and BgShadow width if you change the count:
;    6 cards (2x3) = 430    5 cards = 706    4 cards = 568    3 cards = 430    2 cards = 292
;
; ═══════════════════════════════════════════════════════════════

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1


[Metadata]
Name=World Clock
Author=Lerakei-0
Version=1.0.0

[Variables]
Clock1_Label=Los Angeles
Clock1_TZ=-8
Clock1_Visible=1

Clock2_Label=New York
Clock2_TZ=-5
Clock2_Visible=1

Clock3_Label=London
Clock3_TZ=0
Clock3_Visible=1

Clock4_Label=Local
Clock4_TZ=Local
Clock4_Visible=1

Clock5_Label=Tokyo
Clock5_TZ=9
Clock5_Visible=1

Clock6_Label=Sydney
Clock6_TZ=10
Clock6_Visible=1

; ═══════════════════════════════════════════════════════════════
;  MEASURES
; ═══════════════════════════════════════════════════════════════

[M1_Time]
Measure=Time
TimeZone=Local
Format=%#I:%M

[M1_Sec]
Measure=Time
TimeZone=Local
Format=%S

[M1_AMPM]
Measure=Time
TimeZone=Local
Format=%p

[M1_Day]
Measure=Time
TimeZone=Local
Format=%a %b %d

[M2_Time]
Measure=Time
TimeZone=#Clock2_TZ#
DaylightSavingTime=0
Format=%#I:%M
